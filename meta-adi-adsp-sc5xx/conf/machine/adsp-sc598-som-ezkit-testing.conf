require conf/machine/adsp-sc598-som-ezkit.conf

# Make every recipe override that targets the stock machine
# (e.g. SRC_URI:append:adsp-sc598-som-ezkit) also apply to this machine.
MACHINEOVERRIDES =. "adsp-sc598-som-ezkit:"

# Reuse the stock machine's prebuilt RPMsg echo core images (which are named
# per-machine) rather than requiring boottrace-specific copies.
RPMSG_ECHO_MACHINE = "adsp-sc598-som-ezkit"

IMAGE_INSTALL:append = " gpio-boot-trace"
