require conf/machine/include/adsp-sc5xx.inc

LDR_PROC = "SC589"
LDR_BCODE ?= "2"

MACHINE_EXTRA_RDEPENDS = "adsp-boot"

MACHINE_FEATURES += " spl "

BASH_HAS_SPL = "1"

UBOOT_MACHINE = "sc589-mini_defconfig"
UBOOT_ENTRYPOINT = "0xC4008000"
UBOOT_LOADADDRESS = "0xC4008000"
UBOOT_DTBADDRESS = "0xC4000000"
UBOOT_RDADDR = "0xC5000000"

#Hardware revision
BRD_REV ?= "2.1"

KERNEL_DEVICETREE = "adi/sc589-mini.dtb"

SERIAL_CONSOLES ?= "115200;ttySC0"

MMC_BOOT_STAGE1 = "u-boot-spl.ldr"
MMC_BOOT_STAGE2 = "u-boot.ldr"

IMAGE_FSTYPES = "tar.xz ubifs wic.gz ext4"
WKS_FILE = "adsp-sc5xx.wks.in"

MACHINE_EXTRA_RRECOMMENDS = "kernel-modules"
BOARD = "sc589-mini"

MKUBIFS_ARGS = "-m 1 -e 65408 -c 882"
