# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have a recipes-* directories, add to BBFILES
BBFILES += " \
	${LAYERDIR}/recipes-*/*/*.bb \
	${LAYERDIR}/recipes-*/*/*.bbappend \
"

BBFILE_COLLECTIONS += "adsp-sc5xx"
BBFILE_PATTERN_adsp-sc5xx = "^${LAYERDIR}/"
BBFILE_PRIORITY_adsp-sc5xx = "6"

# meta-arm is required by the security recipes merged in from the former
# meta-adi-adsp-sc5xx-security layer (e.g. trusted-firmware-a)
LAYERDEPENDS_adsp-sc5xx = " meta-arm"

LAYERSERIES_COMPAT_adsp-sc5xx = "scarthgap"
