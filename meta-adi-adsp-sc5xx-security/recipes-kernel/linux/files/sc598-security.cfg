# SC598 security (OP-TEE) kernel config deltas.
# Companion to 0001-sc598-Security-configuration-device-tree.patch.

# Enable the OP-TEE / TEE stack so the optee firmware node has a driver
CONFIG_TEE=y
CONFIG_OPTEE=y

# RPMsg control endpoint to talk to SHARC cores loaded by the secure world
CONFIG_RPMSG_CTRL=y

# Storage support used by the security image tooling
CONFIG_SCSI=y
CONFIG_BLK_DEV_SD=y
CONFIG_USB_STORAGE=y

# Disable drivers for peripherals now owned by the secure world (SPU-secured).
# Their device-tree nodes are also disabled, but keep the drivers out too.
# CONFIG_HW_RANDOM_ADI is not set
# CONFIG_CRYPTO_DEV_ADI_CRC is not set
# CONFIG_CRYPTO_DEV_ADI_HASH is not set
# CONFIG_CRYPTO_DEV_ADI_SKCIPHER is not set
