name: Build documentation
on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'docs/**'
  pull_request:
    branches:
      - main
      - dev
    paths:
      - 'docs/**'

jobs:
  build-doc:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      base_path: ${{ steps.base-path.outputs.base_path }}

    steps:
    - name: Set base_path
      id: base-path
      run: |
        if [[ "${{ github.event_name }}" == "pull_request" || "${{ github.ref_name }}" == "main" ]]; then
          echo "base_path=." >> "$GITHUB_OUTPUT"
        else
          echo "base_path=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
        fi
    - uses: analogdevicesinc/doctools/checkout@action

    - name: Install pip packages
      run: |
        python3 -m venv ~/venv
        source ~/venv/bin/activate
        pip3 install -r docs/requirements.txt --upgrade
    - name: Build doc
      working-directory: docs
      run: |
        source ~/venv/bin/activate
        make html SPHINXOPTS='-jauto -W --keep-going'
    - name: Store the generated doc
      uses: actions/upload-artifact@v6
      with:
        name: html
        path: docs/_build/html

  deploy-doc:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: build-doc

    steps:
    - uses: analogdevicesinc/doctools/gh-pages-deploy@action
      with:
        name: html
        path: ${{ needs.build-doc.outputs.base_path }}